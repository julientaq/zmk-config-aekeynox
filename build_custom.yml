# Same contents as `build.yaml` except:
# - zmk studio isn’t enabled (don’t use it, so might as well use the faster builds)
# - it builds my janky ass custom keymap (seriously, **don’t** use it)

include:
  # Quacken Zero + SparkFun RP2040
  - board: sparkfun_pro_micro_rp2040//zmk
    shield: quacken_zero
    artifact-name: quacken_zero
    cmake-args: -DKEYMAP_FILE=/__w/zmk-config-aekeynox/zmk-config-aekeynox/include/aekeynox/custom.keymap

  # Totem + XIAO BLE
  - board: xiao_ble//zmk
    shield: totem_left
    artifact-name: totem_left
    cmake-args: -DKEYMAP_FILE=/__w/zmk-config-aekeynox/zmk-config-aekeynox/include/aekeynox/custom.keymap
  - board: xiao_ble//zmk
    shield: totem_right
    artifact-name: totem_right
    cmake-args: -DKEYMAP_FILE=/__w/zmk-config-aekeynox/zmk-config-aekeynox/include/aekeynox/custom.keymap

  # Corne + nice!nano v2
  - board: nice_nano@2//zmk
    shield: corne_left
    artifact-name: corne_left
    cmake-args: -DKEYMAP_FILE=/__w/zmk-config-aekeynox/zmk-config-aekeynox/include/aekeynox/custom.keymap
  - board: nice_nano@2//zmk
    shield: corne_right
    artifact-name: corne_right
    cmake-args: -DKEYMAP_FILE=/__w/zmk-config-aekeynox/zmk-config-aekeynox/include/aekeynox/custom.keymap

  # Sweep + nice!nano v2
  - board: nice_nano@2//zmk
    shield: cradio_left
    artifact-name: sweep_left
    cmake-args: -DKEYMAP_FILE=/__w/zmk-config-aekeynox/zmk-config-aekeynox/include/aekeynox/custom.keymap
  - board: nice_nano@2//zmk
    shield: cradio_right
    artifact-name: sweep_right
    cmake-args: -DKEYMAP_FILE=/__w/zmk-config-aekeynox/zmk-config-aekeynox/include/aekeynox/custom.keymap

  # Lily58 + nice!nano v2
  - board: nice_nano@2//zmk
    shield: lily58_left
    artifact-name: lily58_left
    cmake-args: -DKEYMAP_FILE=/__w/zmk-config-aekeynox/zmk-config-aekeynox/include/aekeynox/custom.keymap
  - board: nice_nano@2//zmk
    shield: lily58_right
    artifact-name: lily58_right
    cmake-args: -DKEYMAP_FILE=/__w/zmk-config-aekeynox/zmk-config-aekeynox/include/aekeynox/custom.keymap

  ###
  # Standalone Keyboards (onboard MCU)
  ##

  # Quacken Flex (RP2040)
  - board: quacken_flex/rp2040
    artifact-name: quacken_flex
    cmake-args: -DKEYMAP_FILE=/__w/zmk-config-aekeynox/zmk-config-aekeynox/include/aekeynox/custom.keymap

  # Ferris (STM32F072)
  # Note: not enough memory for ZMK Studio
  - board: ferris//zmk
    artifact-name: ferris
    cmake-args: -DKEYMAP_FILE=/__w/zmk-config-aekeynox/zmk-config-aekeynox/include/aekeynox/custom.keymap

  # Corneish Zen (nRF52840)
  - board: corneish_zen_left//zmk
    artifact-name: corneish_zen_left
